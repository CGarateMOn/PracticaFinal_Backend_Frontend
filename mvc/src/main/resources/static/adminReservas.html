<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Reservas</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="src/Captura de pantalla 2026-04-15 171537.png">
    </head>
    <body>
        <header class="cabecera">
            <div class="nav-grupo">
                <a href="index.html" class="logo">&#127934 Premium Padel</a>
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="admin.html" class="nav-link">Panel Admin</a>
                <a href="adminUsuarios.html" class="nav-link">Usuarios</a>
                <a href="adminPistas.html" class="nav-link">Pistas</a>
                <a href="adminReservas.html" class="nav-link">Reservas</a>
            </div>
            <div class="nav-grupo">
                <span class="admin-badge">ÁREA ADMIN</span>
                <a href="notificaciones.html" class="nav-link icono">&#128276</a>
                <a href="perfil.html" class="nav-link icono">&#128100</a>
            </div>
        </header>
        <main class="contenedor-principal admin-dashboard">
            <section class="intro">
                <h2>Gestión de reservas</h2>
                <p>Consulta y filtra las reservas realizadas en el club.</p>
            </section>

            <section class="admin-bloque">
                <div class="admin-bloque-cabecera admin-toolbar">
                    <div class="form-group">
                        <label for="inputFecha">Fecha</label>
                        <input type="date" id="inputFecha">
                    </div>

                    <div class="form-group">
                        <label for="inputPista">Pista</label>
                        <select id="inputPista">
                            <option value="">Todas las pistas</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="inputUsuario">Usuario</label>
                        <select id="inputUsuario">
                            <option value="">Todos los usuarios</option>
                        </select>
                    </div>

                    <button type="button" id="btnFiltrarReservas" class="btn-filtro btn-admin-principal">
                        Filtrar
                    </button>

                    <button type="button" id="btnLimpiarFiltros" class="btn-filtro">
                        Limpiar
                    </button>
                </div>

                <p id="mensajeReservas" class="login-footer"></p>

                <div class="tabla-admin-wrapper">
                    <table class="tabla-admin">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Pista</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Duración</th>
                            <th>Estado</th>
                        </tr>
                        </thead>
                        <tbody id="tablaReservas">
                        <!-- JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <div class="espacio"></div>

    <script src="adminReservas.js"></script>
    <script src="navbar.js"></script>

</body>
</html>
