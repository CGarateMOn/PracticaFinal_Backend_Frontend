        <div class="espacio"></div>
    <div class="Signin-container">
        <h2>Crear cuenta</h2>
        
        <form id="SigninForm">
            
            <div class="form-group">
                <label for="Nombre">Tu nombre</label>
                <input type="text" id="Nombre" name="Nombre" placeholder="Amaya" required>
            </div>

            <div class="form-group">
                <label for="Apellidos">Tus apellidos</label>
                <input type="text" id="Apellidos" name="Apellidos" placeholder="Baro Marín" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="TuCorreoAqui@email.com" required>
            </div>

            <div class="form-group">
                <label for="telefono">Telefono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+34 648 116 789" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="**********" required>
            </div>

            <div class="form-group">
                <label for="password">Repite tu contraseña</label>
                <input type="password" id="password2" name="password2" placeholder="**********" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p class="login-footer">¿Ya tienes cuenta? <a href="logIn.html">Inicia sesión</a></p>
    </div>

    <footer class="footer">
        <a href="admin.html" class="footer-link">Panel de administración</a>
    </footer>

    <script src="signup.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
