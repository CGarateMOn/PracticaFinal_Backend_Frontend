<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestión de Usuarios</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="src/Captura de pantalla 2026-04-15 171537.png">
    </head>
    <body>
        <header class="cabecera">
            <div class="nav-grupo">
                <a href="index.html" class="logo">&#127934 Premium Padel</a>
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="admin.html" class="nav-link">Panel Admin</a>
                <a href="adminUsuarios.html" class="nav-link">Usuarios</a>
                <a href="adminPistas.html" class="nav-link">Pistas</a>
                <a href="adminReservas.html" class="nav-link">Reservas</a>
            </div>
            <div class="nav-grupo">
                <span class="admin-badge">ÁREA ADMIN</span>
                <a href="notificaciones.html" class="nav-link icono">&#128276</a>
                <a href="perfil.html" class="nav-link icono">&#128100</a>
            </div>
        </header>
        <div class="espacio"></div>
        <main class="contenedor-principal admin-dashboard">
            <section class="intro">
                <h2>Gestión de usuarios</h2>
                <p>Consulta y administra los usuarios registrados.</p>
            </section>
            <section class="admin-bloque">
                <div class="admin-bloque-cabecera admin-toolbar">
                    <div class="form-group">
                        <label for="filtroRol">Rol</label>
                        <select id="filtroRol" class="select-admin">
                            <option value="">Todos</option>
                            <option value="ADMIN">Admin</option>
                            <option value="USER">User</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filtroActivo">Estado</label>
                        <select id="filtroActivo" class="select-admin">
                            <option value="">Todos</option>
                            <option value="true">Activos</option>
                            <option value="false">Inactivos</option>
                        </select>
                    </div>
                    <button type="button" id="btnFiltrarUsuarios" class="btn-filtro btn-admin-principal">
                        Filtrar
                    </button>
                    <button type="button" id="btnLimpiarFiltrosUsuarios" class="btn-filtro">
                        Limpiar
                    </button>
                </div>
                <p id="mensajeUsuarios" class="login-footer"></p>
                <div class="tabla-admin-wrapper">
                    <table class="tabla-admin tabla-usuarios-admin">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Fecha registro</th>
                            <th>Acción</th>
                        </tr>
                        </thead>
                        <tbody id="tablaUsuarios">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <script src="adminUsuarios.js"></script>
        <script src="navbar.js"></script>
        <footer class="login-footer">
            <p>@ 2026 Premium Padel Club</p>
        </footer>
    </body>
</html>
