<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestión de Pistas</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="src/Captura de pantalla 2026-04-15 171537.png">
    </head>
    <body>
        <header class="cabecera">
            <div class="nav-grupo">
                <a href="index.html" class="logo">&#127934 Premium Padel</a>
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="admin.html" class="nav-link">Panel Admin</a>
                <a href="adminUsuarios.html" class="nav-link">Usuarios</a>
                <a href="adminPistas.html" class="nav-link">Pistas</a>
                <a href="adminReservas.html" class="nav-link">Reservas</a>
            </div>
            <div class="nav-grupo">
                <span class="admin-badge">ÁREA ADMIN</span>
                <a href="notificaciones.html" class="nav-link icono">&#128276</a>
                <a href="perfil.html" class="nav-link icono">&#128100</a>
            </div>
        </header>
        <div class="espacio"></div>
        <main class="contenedor-principal admin-dashboard">
            <section class="intro">
                <h2>Gestión de pistas</h2>
            </section>
            <div class="espacio"></div>

            <input type="radio" name="filtro-pistas-admin" id="admin-todas" checked class="filtro-oculto">
            <input type="radio" name="filtro-pistas-admin" id="admin-activas" class="filtro-oculto">
            <input type="radio" name="filtro-pistas-admin" id="admin-inactivas" class="filtro-oculto">

            <section class="admin-bloque">
                <div class="admin-bloque-cabecera admin-toolbar">
                    <div class="menu-filtros admin-menu-filtros">
                        <label for="admin-todas" class="btn-filtro">Todas</label>
                        <label for="admin-activas" class="btn-filtro">Activas</label>
                        <label for="admin-inactivas" class="btn-filtro">Inactivas</label>
                    </div>

                    <a href="adminFormularioPista.html" class="btn-filtro btn-admin-principal">Nueva pista</a>
                </div>

                <div class="tabla-admin-wrapper">
                    <p id="mensajePistas"></p>
                    <table class="tabla-admin tabla-pistas-admin">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Ubicación</th>
                            <th>Precio/hora</th>
                            <th>Estado</th>
                            <th>Fecha alta</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="cuerpoTablaPistas">
                        </tbody>
                    </table>
                </div>
        </section>
        </main>
        <script src="adminPistas.js"></script>
    </body>        
    <footer class="login-footer">
        <p>@ 2026 Premium Padel Club</p>
    </footer>
</html>
