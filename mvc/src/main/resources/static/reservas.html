<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Reservar pista</title>

    <body>
        <header class="cabecera">
            <div class="nav-grupo">

        <main class="contenedor-principal">

                <h2>Reserva tu pista de padel</h2>
                <p class="subtitulo">Selecciona la fecha y el horario para tu próximo partido.</p>

                <img src="src/mapa.png" alt="mapa">
            </div>
 
            <div id="contenedor-pistas" class="pistas">
                <p id="msg-selecciona" class="subtitulo">
                    Selecciona una fecha para ver la disponibilidad.
                </p>
            </div>

        <footer class="login-footer">
